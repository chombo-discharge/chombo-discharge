ci:
  skip: [cmake-generate-compile-commands, clang-tidy, doxygen-check, sphinx-build]

repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        name: Format source files (clang-format)
        types_or: [c++, c]

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.1.0
    hooks:
      - id: reuse

  - repo: https://github.com/codespell-project/codespell
    rev: v2.1.0
    hooks:
      - id: codespell
        files: ^(Source|Docs|Exec|Physics|Geometries)/
        args:
          - "--ignore-words=.codespellignore"
          - "--skip=*.bib,*.js,Docs/Sphinx/build,Docs/doxygen"

  - repo: local
    hooks:
      - id: clang-tidy
        name: check clang-tidy
        entry: ./run_clang_tidy.sh
        language: script
        files: ^(Source|Exec|Physics|Geometries)/.*\.cpp$
        pass_filenames: true

      - id: format-input-files
        name: Format input files (.options and .inputs)
        entry: ./FormatInputFiles.sh
        language: script
        files: \.(inputs|options)$
        pass_filenames: false

      - id: doxygen-check
        name: Check doxygen documentation (warnings as errors)
        entry: doxygen Docs/doxygen.conf
        language: system
        pass_filenames: false
        files: \.(H|cpp)$

      - id: sphinx-build
        name: Build Sphinx documentation (warnings as errors)
        entry: sphinx-build -W --keep-going -b html Docs/Sphinx/source Docs/Sphinx/build/html
        language: system
        pass_filenames: false
        stages: [manual]
